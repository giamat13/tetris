<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>טטריס קלאסי</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="https://giamatamat2013.github.io/Warp/firebase-ls-proxy.js"></script>
    <style>
        body {
            background-color: #1a1a2e;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: none;
        }
        #game-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            gap: 20px;
        }
        canvas {
            border: 4px solid #4e4e91;
            background-color: #0f0f1b;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            max-height: 70vh;
        }
        .stats-panel {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            min-width: 150px;
        }
        .controls-hint {
            font-size: 0.8rem;
            color: #888;
            margin-top: 10px;
            text-align: center;
        }
        .touch-controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 10px;
        }
        .touch-btn {
            background: #4e4e91;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            user-select: none;
            active: scale(0.95);
        }
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="overlay">
        <h1 class="text-4xl font-bold mb-4">טטריס</h1>
        <button id="start-btn" class="bg-blue-600 hover:bg-blue-500 px-8 py-3 rounded-full text-xl font-bold transition">שחק עכשיו</button>
    </div>

    <div class="flex flex-col md:flex-row gap-8 items-start">
        <div class="flex flex-col gap-4">
            <div class="stats-panel">
                <p class="text-sm">ניקוד</p>
                <p id="score" class="text-2xl font-mono">0</p>
            </div>
            <div class="stats-panel">
                <p class="text-sm">רמה</p>
                <p id="level" class="text-2xl font-mono">1</p>
            </div>
            <div class="stats-panel">
                <p class="text-sm">הבא בתור</p>
                <canvas id="next-canvas" width="80" height="80"></canvas>
            </div>
        </div>

        <canvas id="tetris" width="240" height="400"></canvas>

        <div class="hidden md:block w-48">
            <h3 class="font-bold mb-2">מקשים:</h3>
            <ul class="text-sm space-y-1">
                <li>← → : תנועה</li>
                <li>↑ : סיבוב</li>
                <li>↓ : נפילה מהירה</li>
                <li>רווח : נפילה חופשית</li>
            </ul>
        </div>
    </div>

    <!-- כפתורי מגע לנייד -->
    <div class="touch-controls md:hidden">
        <div></div>
        <div class="touch-btn" id="touch-up">↑</div>
        <div></div>
        <div class="touch-btn" id="touch-left">←</div>
        <div class="touch-btn" id="touch-down">↓</div>
        <div class="touch-btn" id="touch-right">→</div>
        <div class="touch-btn col-span-3 mt-2 bg-green-700" id="touch-drop">נפילה מהירה (SPACE)</div>
    </div>
</div>

<script>
const canvas = document.getElementById('tetris');
const context = canvas.getContext('2d');
const nextCanvas = document.getElementById('next-canvas');
const nextContext = nextCanvas.getContext('2d');

context.scale(20, 20);
nextContext.scale(20, 20);

// צבעים לצורות
const colors = [
    null,
    '#FF0D72', // T
    '#0DC2FF', // I
    '#0DFF72', // S
    '#F538FF', // Z
    '#FF8E0D', // L
    '#FFE138', // O
    '#3877FF', // J
];

function createPiece(type) {
    if (type === 'I') {
        return [
            [0, 1, 0, 0],
            [0, 1, 0, 0],
            [0, 1, 0, 0],
            [0, 1, 0, 0],
        ];
    } else if (type === 'L') {
        return [
            [0, 2, 0],
            [0, 2, 0],
            [0, 2, 2],
        ];
    } else if (type === 'J') {
        return [
            [0, 3, 0],
            [0, 3, 0],
            [3, 3, 0],
        ];
    } else if (type === 'O') {
        return [
            [4, 4],
            [4, 4],
        ];
    } else if (type === 'Z') {
        return [
            [5, 5, 0],
            [0, 5, 5],
            [0, 0, 0],
        ];
    } else if (type === 'S') {
        return [
            [0, 6, 6],
            [6, 6, 0],
            [0, 0, 0],
        ];
    } else if (type === 'T') {
        return [
            [0, 7, 0],
            [7, 7, 7],
            [0, 0, 0],
        ];
    }
}

function createMatrix(w, h) {
    const matrix = [];
    while (h--) {
        matrix.push(new Array(w).fill(0));
    }
    return matrix;
}

function drawMatrix(matrix, offset, ctx = context) {
    matrix.forEach((row, y) => {
        row.forEach((value, x) => {
            if (value !== 0) {
                ctx.fillStyle = colors[value];
                ctx.fillRect(x + offset.x, y + offset.y, 1, 1);
                // הוספת מסגרת עדינה לקוביה
                ctx.lineWidth = 0.05;
                ctx.strokeStyle = 'white';
                ctx.strokeRect(x + offset.x, y + offset.y, 1, 1);
            }
        });
    });
}

function drawNext() {
    nextContext.fillStyle = '#0f0f1b';
    nextContext.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
    drawMatrix(player.next, {x: 1, y: 1}, nextContext);
}

function draw() {
    context.fillStyle = '#0f0f1b';
    context.fillRect(0, 0, canvas.width, canvas.height);

    drawMatrix(arena, {x: 0, y: 0});
    drawMatrix(player.matrix, player.pos);
}

function merge(arena, player) {
    player.matrix.forEach((row, y) => {
        row.forEach((value, x) => {
            if (value !== 0) {
                arena[y + player.pos.y][x + player.pos.x] = value;
            }
        });
    });
}

function rotate(matrix, dir) {
    for (let y = 0; y < matrix.length; ++y) {
        for (let x = 0; x < y; ++x) {
            [
                matrix[x][y],
                matrix[y][x],
            ] = [
                matrix[y][x],
                matrix[x][y],
            ];
        }
    }
    if (dir > 0) {
        matrix.forEach(row => row.reverse());
    } else {
        matrix.reverse();
    }
}

function collide(arena, player) {
    const [m, o] = [player.matrix, player.pos];
    for (let y = 0; y < m.length; ++y) {
        for (let x = 0; x < m[y].length; ++x) {
            if (m[y][x] !== 0 &&
               (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) {
                return true;
            }
        }
    }
    return false;
}

function arenaSweep() {
    let rowCount = 1;
    outer: for (let y = arena.length - 1; y > 0; --y) {
        for (let x = 0; x < arena[y].length; ++x) {
            if (arena[y][x] === 0) {
                continue outer;
            }
        }

        const row = arena.splice(y, 1)[0].fill(0);
        arena.unshift(row);
        ++y;

        player.score += rowCount * 10;
        rowCount *= 2;
    }
    updateScore();
}

function playerDrop() {
    player.pos.y++;
    if (collide(arena, player)) {
        player.pos.y--;
        merge(arena, player);
        playerReset();
        arenaSweep();
        updateScore();
    }
    dropCounter = 0;
}

function playerHardDrop() {
    while (!collide(arena, player)) {
        player.pos.y++;
    }
    player.pos.y--;
    merge(arena, player);
    playerReset();
    arenaSweep();
    updateScore();
    dropCounter = 0;
}

function playerMove(dir) {
    player.pos.x += dir;
    if (collide(arena, player)) {
        player.pos.x -= dir;
    }
}

function playerReset() {
    const pieces = 'ILJOTSZ';
    if (player.next === null) {
        player.next = createPiece(pieces[pieces.length * Math.random() | 0]);
    }
    player.matrix = player.next;
    player.next = createPiece(pieces[pieces.length * Math.random() | 0]);
    player.pos.y = 0;
    player.pos.x = (arena[0].length / 2 | 0) -
                   (player.matrix[0].length / 2 | 0);
    
    drawNext();

    if (collide(arena, player)) {
        arena.forEach(row => row.fill(0));
        player.score = 0;
        player.level = 1;
        updateScore();
        showMenu("Game Over");
    }
}

function playerRotate(dir) {
    const pos = player.pos.x;
    let offset = 1;
    rotate(player.matrix, dir);
    while (collide(arena, player)) {
        player.pos.x += offset;
        offset = -(offset + (offset > 0 ? 1 : -1));
        if (offset > player.matrix[0].length) {
            rotate(player.matrix, -dir);
            player.pos.x = pos;
            return;
        }
    }
}

function updateScore() {
    document.getElementById('score').innerText = player.score;
    player.level = Math.floor(player.score / 100) + 1;
    document.getElementById('level').innerText = player.level;
}

let dropCounter = 0;
let dropInterval = 1000;
let lastTime = 0;
let isPaused = true;

function update(time = 0) {
    if (isPaused) return;

    const deltaTime = time - lastTime;
    lastTime = time;

    dropCounter += deltaTime;
    // מהירות עולה עם הרמה
    let currentInterval = Math.max(100, dropInterval - (player.level * 50));
    
    if (dropCounter > currentInterval) {
        playerDrop();
    }

    draw();
    requestAnimationFrame(update);
}

const arena = createMatrix(12, 20);

const player = {
    pos: {x: 0, y: 0},
    matrix: null,
    next: null,
    score: 0,
    level: 1,
};

function showMenu(text = "טטריס") {
    isPaused = true;
    const overlay = document.getElementById('overlay');
    overlay.style.display = 'flex';
    overlay.querySelector('h1').innerText = text;
    overlay.querySelector('button').innerText = "שחק שוב";
}

document.getElementById('start-btn').addEventListener('click', () => {
    document.getElementById('overlay').style.display = 'none';
    isPaused = false;
    if (player.score === 0) {
        playerReset();
    }
    lastTime = performance.now();
    update();
});

// מאזיני מקלדת
document.addEventListener('keydown', event => {
    if (isPaused) return;

    if (event.keyCode === 37) { // Left
        playerMove(-1);
    } else if (event.keyCode === 39) { // Right
        playerMove(1);
    } else if (event.keyCode === 40) { // Down
        playerDrop();
    } else if (event.keyCode === 38) { // Up
        playerRotate(1);
    } else if (event.keyCode === 32) { // Space
        playerHardDrop();
    }
});

// מאזיני מגע
document.getElementById('touch-left').addEventListener('touchstart', (e) => { e.preventDefault(); playerMove(-1); });
document.getElementById('touch-right').addEventListener('touchstart', (e) => { e.preventDefault(); playerMove(1); });
document.getElementById('touch-up').addEventListener('touchstart', (e) => { e.preventDefault(); playerRotate(1); });
document.getElementById('touch-down').addEventListener('touchstart', (e) => { e.preventDefault(); playerDrop(); });
document.getElementById('touch-drop').addEventListener('touchstart', (e) => { e.preventDefault(); playerHardDrop(); });

// אתחול ראשוני של התצוגה
updateScore();
draw();
</script>
</body>
</html>
